<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是哪位球星？2026世界杯人格测试</title>
<meta property="og:title" content="你是哪位球星？2026世界杯人格测试">
<meta property="og:description" content="30道题，测出你最像哪位球星">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F5F0;
    --bg2: #FFFFFF;
    --bg3: #ECECEA;
    --accent: #1A1A1A;
    --accent-dim: rgba(0,0,0,0.06);
    --accent-dim2: rgba(0,0,0,0.03);
    --accent-green: #00C853;
    --white: #1A1A1A;
    --gray1: #888888;
    --gray2: #BBBBBB;
    --gray3: #E0E0DC;
    --font-en: 'Space Grotesk', sans-serif;
    --font-cn: 'Noto Sans SC', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: #1A1A1A;
    font-family: var(--font-cn);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ===== LANDING ===== */
  #screen-landing {
    position: relative;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    overflow: hidden;
  }

  .landing-bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .landing-glow {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,200,83,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    pointer-events: none;
  }

  .landing-content {
    position: relative;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .landing-eyebrow {
    font-family: var(--font-en);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent-green);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .landing-title {
    font-size: clamp(36px, 10vw, 64px);
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .landing-title .highlight {
    color: var(--accent-green);
    display: block;
  }

  .landing-subtitle {
    font-size: 15px;
    color: var(--gray1);
    margin-bottom: 40px;
    line-height: 1.6;
  }

  .star-parade {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 40px;
  }

  .star-parade-item {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    overflow: hidden;
    margin-left: -16px;
    background: var(--bg3);
    transition: transform 0.2s;
  }

  .star-parade-item:first-child { margin-left: 0; }

  .star-parade-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .star-parade-item:hover { transform: translateY(-6px) scale(1.05); z-index: 10; }

  .btn-start {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #1A1A1A;
    color: #FFFFFF;
    font-family: var(--font-cn);
    font-size: 17px;
    font-weight: 700;
    padding: 16px 40px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    letter-spacing: 0.02em;
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  .btn-start:active { transform: translateY(0); }

  .landing-meta {
    margin-top: 20px;
    font-size: 13px;
    color: var(--gray2);
    font-family: var(--font-en);
  }

  /* ===== QUIZ ===== */
  #screen-quiz {
    padding: 0;
  }

  .quiz-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--gray3);
    padding: 16px 24px;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--gray3);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent-green);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    border-radius: 2px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .progress-label {
    font-family: var(--font-en);
    font-size: 12px;
    color: var(--gray1);
    font-weight: 500;
  }

  .progress-num {
    font-family: var(--font-en);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent-green);
  }

  .quiz-body {
    flex: 1;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  .question-group-label {
    font-family: var(--font-en);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent-green);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.9;
  }

  .question-text {
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 32px;
    letter-spacing: -0.01em;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg2);
    border: 1px solid var(--gray3);
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    color: var(--white);
    font-family: var(--font-cn);
    font-size: 15px;
    line-height: 1.5;
    position: relative;
    overflow: hidden;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-dim2);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .option-btn:hover {
    border-color: #1A1A1A;
    background: var(--accent-dim);
  }

  .option-btn:hover::before { opacity: 1; }

  .option-btn.selected {
    border-color: #1A1A1A;
    background: var(--accent-dim);
  }

  .option-btn.selected .option-key {
    background: #1A1A1A;
    color: #FFFFFF;
  }

  .option-key {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--gray2);
    font-family: var(--font-en);
    font-size: 12px;
    font-weight: 700;
    color: var(--gray1);
    transition: all 0.15s;
  }

  .quiz-nav {
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    padding: 0 24px 40px;
    display: flex;
    gap: 12px;
  }

  .btn-prev {
    flex: 0 0 auto;
    background: transparent;
    border: 1px solid var(--gray3);
    color: var(--gray1);
    font-family: var(--font-cn);
    font-size: 15px;
    padding: 14px 20px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-prev:hover { border-color: var(--gray1); color: var(--white); }

  .btn-next {
    flex: 1;
    background: #1A1A1A;
    color: #FFFFFF;
    border: none;
    font-family: var(--font-cn);
    font-size: 16px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
    opacity: 0.2;
    pointer-events: none;
  }

  .btn-next.enabled {
    opacity: 1;
    pointer-events: auto;
  }

  .btn-next.enabled:hover { filter: brightness(1.1); }

  /* ===== AD SCREEN ===== */
  #screen-ad {
    align-items: center;
    justify-content: center;
    padding: 0;
    position: relative;
  }

  .ad-content {
    text-align: center;
    width: 100%;
    max-width: 600px;
    padding: 40px 24px;
  }

  .ad-analyzing {
    font-family: var(--font-en);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent-green);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .ad-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 32px;
  }

  .ad-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gray2);
    animation: dotPulse 1.4s infinite;
  }

  .ad-dot:nth-child(2) { animation-delay: 0.2s; }
  .ad-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { background: var(--gray2); transform: scale(1); }
    40% { background: var(--accent-green); transform: scale(1.3); }
  }

  .ad-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .ad-sub {
    font-size: 14px;
    color: var(--gray1);
    margin-bottom: 32px;
  }

  /* Ad placeholder */
  .ad-placeholder {
    width: 100%;
    max-width: 360px;
    height: 250px;
    background: var(--bg3);
    border: 1px dashed var(--gray3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 12px;
    color: var(--gray2);
    font-family: var(--font-en);
  }

  .ad-placeholder-fullscreen {
    position: fixed;
    inset: 0;
    background: #FFFFFF;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    gap: 0;
    padding: 32px 24px;
  }

  .ad-placeholder-fullscreen .ad-inner-box {
    width: 100%;
    max-width: 400px;
    flex: 1;
    background: var(--bg3);
    border: 1px dashed var(--gray3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--gray2);
    font-family: var(--font-en);
    margin: 20px 0;
  }

  .ad-timer {
    font-family: var(--font-en);
    font-size: 13px;
    color: var(--gray1);
  }

  .ad-timer span {
    color: var(--accent-green);
    font-weight: 700;
  }

  /* ===== RESULT ===== */
  #screen-result {
    padding: 0;
  }

  .result-hero {
    position: relative;
    background: var(--bg2);
    border-bottom: 1px solid var(--gray3);
    overflow: hidden;
    padding: 0;
  }

  .result-hero-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 60% 80%, rgba(0,200,83,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  /* 球星图片铺满顶部，文字叠在下方 */
  .result-hero-inner {
    position: relative;
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
  }

  /* 图片区：全宽，固定高度，图片居中 */
  .result-img-side {
    width: 100%;
    height: 280px;
    position: relative;
    overflow: hidden;
    background: #F0F0EB;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .result-star-img {
    height: 260px;
    width: auto;
    max-width: 300px;
    object-fit: contain;
    object-position: bottom center;
    display: block;
    margin: 0 auto;
  }

  /* 图片四周渐变遮罩，融入背景 */
  .result-img-side::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(to bottom, #F0F0EB, transparent);
    pointer-events: none;
    z-index: 1;
  }

  .result-img-side::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 100px;
    background: linear-gradient(to bottom, transparent, #FFFFFF);
    pointer-events: none;
    z-index: 1;
  }

  /* 文字区在图片下方 */
  .result-text-side {
    padding: 16px 24px 28px;
    position: relative;
  }

  .result-eyebrow {
    font-family: var(--font-en);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: var(--accent-green);
    text-transform: uppercase;
    margin-bottom: 0;
    opacity: 0.9;
  }

  .result-pct-display {
    font-family: var(--font-en);
    font-size: clamp(64px, 18vw, 100px);
    font-weight: 800;
    line-height: 0.9;
    color: #1A1A1A;
    letter-spacing: -0.04em;
    margin-bottom: 0;
  }

  .result-pct-label {
    font-size: 12px;
    color: var(--gray1);
    margin-bottom: 10px;
    margin-top: 2px;
  }

  .result-star-name {
    font-size: clamp(32px, 8vw, 48px);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }

  .result-star-type {
    font-size: 13px;
    color: var(--accent-green);
    margin-top: 6px;
    font-weight: 600;
  }

  .result-star-country {
    font-size: 13px;
    color: var(--gray1);
    margin-top: 4px;
    font-family: var(--font-cn);
  }

  .result-body {
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .result-section {
    margin-bottom: 32px;
  }

  .result-section-title {
    font-family: var(--font-en);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--gray1);
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--gray3);
  }

  .result-desc {
    font-size: 16px;
    line-height: 1.7;
    color: #444444;
  }

  .result-quote {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.4;
    color: #1A1A1A;
    border-left: 3px solid var(--accent-green);
    padding-left: 16px;
    margin-top: 20px;
  }

  /* Destiny card */
  .destiny-card {
    background: var(--bg2);
    border: 1px solid var(--gray3);
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .destiny-emoji {
    font-size: 32px;
    flex-shrink: 0;
  }

  .destiny-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .destiny-desc {
    font-size: 13px;
    color: var(--gray1);
    line-height: 1.5;
  }

  /* Partner */
  .partner-card {
    background: var(--bg2);
    border: 1px solid var(--gray3);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .partner-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(0,200,83,0.1);
    border: 1px solid rgba(0,200,83,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .partner-name {
    font-size: 17px;
    font-weight: 700;
  }

  .partner-label {
    font-size: 12px;
    color: var(--gray1);
    margin-top: 2px;
  }

  /* Similar stars */
  .similar-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .similar-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .similar-name {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }

  .similar-bar-wrap {
    flex: 2;
    height: 4px;
    background: var(--gray3);
    border-radius: 2px;
    overflow: hidden;
  }

  .similar-bar-fill {
    height: 100%;
    background: var(--accent-green);
    border-radius: 2px;
    opacity: 0.7;
  }

  .similar-pct {
    font-family: var(--font-en);
    font-size: 13px;
    font-weight: 700;
    color: var(--gray1);
    width: 36px;
    text-align: right;
  }

  /* Share & retry */
  .result-actions {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--bg);
    border-top: 1px solid var(--gray3);
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* Fix: result-actions centering */
  #screen-result .result-actions {
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 600px;
  }

  .btn-share {
    flex: 1;
    background: #1A1A1A;
    color: #FFFFFF;
    border: none;
    font-family: var(--font-cn);
    font-size: 15px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-share:hover { filter: brightness(1.1); }

  .btn-retry {
    flex: 0 0 auto;
    background: transparent;
    border: 1px solid var(--gray3);
    color: var(--gray1);
    font-family: var(--font-cn);
    font-size: 15px;
    padding: 14px 20px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-retry:hover { border-color: var(--gray1); color: var(--white); }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in-up {
    animation: fadeInUp 0.4s ease forwards;
  }

  /* ===== RESPONSIVE ===== */
  /* ===== MOBILE FIRST ===== */
  @media (max-width: 600px) {

    /* Landing */
    #screen-landing { padding: 32px 20px; }
    .landing-eyebrow { font-size: 10px; margin-bottom: 14px; }
    .landing-title { font-size: 40px; line-height: 1.0; margin-bottom: 6px; }
    .landing-subtitle { font-size: 14px; margin-bottom: 28px; }

    .star-parade-item { width: 64px; height: 64px; margin-left: -12px; }
    .star-parade { margin-bottom: 32px; }

    .btn-start { font-size: 16px; padding: 15px 32px; }
    .landing-meta { font-size: 12px; margin-top: 14px; }

    /* Quiz header */
    .quiz-header { padding: 12px 16px; }
    .progress-label { font-size: 11px; }
    .progress-num { font-size: 12px; }

    /* Quiz body */
    .quiz-body { padding: 24px 16px 20px; }
    .question-text { font-size: 18px; margin-bottom: 24px; }
    .options-list { gap: 10px; }
    .option-btn { padding: 15px 16px; font-size: 14px; gap: 12px; }
    .option-key { width: 26px; height: 26px; font-size: 11px; }

    /* Quiz nav */
    .quiz-nav { padding: 0 16px 24px; gap: 10px; }
    .btn-prev { font-size: 14px; padding: 13px 16px; }
    .btn-next { font-size: 15px; padding: 13px; }

    /* Ad screen */
    .ad-title { font-size: 18px; }
    .ad-sub { font-size: 13px; }
    .ad-placeholder { height: 200px !important; }

    /* Result hero */
    .result-hero { padding: 32px 16px 0; }
    .result-pct-display { font-size: 80px; }
    .result-star-name { font-size: 28px; }
    .result-img-side { width: 100%; height: 220px; }
    .result-star-img { height: 220px; max-width: 240px; }

    /* Result body */
    .result-body { padding: 24px 16px 80px; }
    .result-section { margin-bottom: 24px; }
    .result-desc { font-size: 15px; }
    .result-quote { font-size: 17px; }
    .destiny-card { padding: 16px; gap: 12px; }
    .destiny-emoji { font-size: 28px; }
    .destiny-title { font-size: 14px; }
    .destiny-desc { font-size: 12px; }
    .partner-card { padding: 14px 16px; }
    .partner-name { font-size: 16px; }

    /* Result actions */
    .result-actions {
      padding: 12px 16px;
      left: 0 !important;
      transform: none !important;
    }
    .btn-share { font-size: 14px; padding: 13px; }
    .btn-retry { font-size: 14px; padding: 13px 16px; }

    /* Similar list */
    .similar-name { font-size: 13px; }
    .similar-pct { font-size: 12px; }
  }

  /* 极小屏幕 iPhone SE等 */
  @media (max-width: 375px) {
    .landing-title { font-size: 34px; }
    .result-pct-display { font-size: 68px; }
    .result-star-name { font-size: 24px; }
    .result-img-side { width: 100%; height: 190px; }
    .result-star-img { height: 190px; max-width: 200px; }
    .option-btn { padding: 13px 14px; font-size: 13px; }
  }

  /* ===== LANG SWITCH ===== */
  .lang-switch {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 999;
    display: flex;
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--gray3);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(8px);

// ===== SCORING =====
function calcMaxScores() {
  const max = new Array(30).fill(0)
  Object.keys(weights).forEach(key => {
    weights[key].forEach(([idx, val]) => { if (val < 5) max[idx] += val })
  })
  return max
}

function calcResult(ans) {
  const maxScores = calcMaxScores()
  const rawScores = new Array(30).fill(0)
  const regretBonus = new Array(30).fill(0)
  Object.keys(ans).forEach(qid => {
    const key = qid + ans[qid]
    if (weights[key]) {
      weights[key].forEach(([idx, val]) => {
        rawScores[idx] += val
        if (val === 5) regretBonus[idx] += val
      })
    }
  })
  const ranked = starNames.map((name, i) => {
    const normalScore = rawScores[i] - regretBonus[i]
    const maxNormal = maxScores[i]
    const basePct = maxNormal > 0 ? normalScore / maxNormal : 0
    const regretBoost = regretBonus[i] > 0 ? Math.min(regretBonus[i] * 0.05, 0.25) : 0
    const finalPct = Math.min(Math.round((basePct + regretBoost) * 100), 99)
    return { name, idx: i, pct: finalPct, rawScore: rawScores[i] }
  }).sort((a, b) => b.pct - a.pct || b.rawScore - a.rawScore)
  return ranked.slice(0, 3)
}

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  document.getElementById('screen-' + id).classList.add('active')
  window.scrollTo(0, 0)
}

// ===== QUIZ =====
function startQuiz() {
  currentQ = 0
  answers = {}
  renderQuestion()
  showScreen('quiz')
}

function renderQuestion() {
  const q = getQuestions()[currentQ]
  document.getElementById('question-text').textContent = q.text
  document.getElementById('progress-group-label').textContent = i18n[currentLang].progressGroups[currentQ]
  document.getElementById('progress-num').textContent = (currentQ + 1) + ' / 30'
  document.getElementById('progress-fill').style.width = ((currentQ / 30) * 100) + '%'

  const list = document.getElementById('options-list')
  list.innerHTML = ''
  q.options.forEach(opt => {
    const btn = document.createElement('button')
    btn.className = 'option-btn' + (answers[q.id] === opt.key ? ' selected' : '')
    btn.innerHTML = `<span class="option-key">${opt.key}</span><span>${opt.text}</span>`
    btn.onclick = (e) => selectOption(q.id, opt.key, e.currentTarget)
    list.appendChild(btn)
  })

  const t = i18n[currentLang]
  const nextBtn = document.getElementById('btn-next')
  const nextLabel = currentQ === 29 ? t.finishBtn : t.nextBtn
  if (answers[q.id]) {
    nextBtn.classList.add('enabled')
    nextBtn.textContent = nextLabel
  } else {
    nextBtn.classList.remove('enabled')
    nextBtn.textContent = nextLabel
  }

  const prevBtn2 = document.getElementById('btn-prev')
  prevBtn2.style.display = currentQ === 0 ? 'none' : 'block'
  prevBtn2.textContent = t.prevBtn
}

function selectOption(qid, key, el) {
  const nextBtn = document.getElementById('btn-next')
  const nextLabel = currentQ === 29 ? i18n[currentLang].finishBtn : i18n[currentLang].nextBtn

  // 先重置所有选项样式
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.classList.remove('selected')
    btn.querySelector('.option-key').style.background = ''
    btn.querySelector('.option-key').style.color = ''
  })

  // 如果点的是已选中的，则取消选择
  if (answers[qid] === key) {
    delete answers[qid]
    nextBtn.classList.remove('enabled')
    nextBtn.textContent = nextLabel
    return
  }

  // 选中新选项
  answers[qid] = key
  el.classList.add('selected')
  el.querySelector('.option-key').style.background = '#1A1A1A'
  el.querySelector('.option-key').style.color = '#FFFFFF'
  nextBtn.classList.add('enabled')
  nextBtn.textContent = nextLabel
}

function nextQuestion() {
  if (!answers[questions[currentQ].id]) return
  if (currentQ === 14) {
    showAd()
    return
  }
  if (currentQ === 29) {
    showAdThenResult()
    return
  }
  currentQ++
  renderQuestion()
  window.scrollTo(0, 0)
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--
    renderQuestion()
    window.scrollTo(0, 0)
  }
}

function showAdThenResult() {
  showScreen('ad')
  updateAdText('adTitle2')
  document.getElementById('ad-countdown').textContent = 5
  let count = 5
  const timer = setInterval(() => {
    count--
    document.getElementById('ad-countdown').textContent = count
    if (count <= 0) {
      clearInterval(timer)
      showResult()
    }

  const t = i18n[currentLang]
  document.getElementById('ad-main-title').textContent = t[titleKey]
  document.getElementById('ad-sub-text').textContent = t.adSub
  document.getElementById('ad-countdown-label').textContent = t.adCountdown
  document.getElementById('ad-countdown-suffix').textContent = t.adCountdown2
}

function showAd() {
  showScreen('ad')
  updateAdText('adTitle')
  let count = 5
  document.getElementById('ad-countdown').textContent = count
  adTimer = setInterval(() => {
    count--
    document.getElementById('ad-countdown').textContent = count
    if (count <= 0) {
      clearInterval(adTimer)
      currentQ++
      renderQuestion()
      showScreen('quiz')
    }

  const top3 = calcResult(answers)

  document.getElementById('result-pct').textContent = top.pct + '%'
  document.getElementById('result-name').textContent = currentLang === 'en' ? (starsEn[top.name] ? starsEn[top.name].name : top.name) : top.name

  document.getElementById('result-desc1').textContent = starData.desc1
  document.getElementById('result-quote').textContent = '「' + starData.quote + '」'

  const destiny = getDestinyData(starData.destiny)
  document.getElementById('destiny-emoji').textContent = destiny.emoji
  document.getElementById('destiny-title').textContent = destiny.title
  document.getElementById('destiny-desc').textContent = starData.destinyDesc || destiny.desc

  if (starData.partner) {
    document.getElementById('partner-section').style.display = 'block'
    // 找partner对应的英文名
    let partnerDisplay = starData.partner
    if (currentLang === 'en' && starsEn[starData.partner]) {
      partnerDisplay = starsEn[starData.partner].name
    }
    document.getElementById('partner-name').textContent = partnerDisplay
  } else {
    document.getElementById('partner-section').style.display = 'none'
  }

  const similarList = document.getElementById('similar-list')
  similarList.innerHTML = ''
  top3.forEach((s, i) => {
    const item = document.createElement('div')
    item.className = 'similar-item'
    const displayName = currentLang === 'en' && starsEn[s.name] ? starsEn[s.name].name : s.name
    item.innerHTML = `
      <span class="similar-name">${i === 0 ? '⭐ ' : ''}${displayName}</span>

      <span class="similar-pct">${s.pct}%</span>
    `
    similarList.appendChild(item)
  })

  showScreen('result')
}

function setLang(lang) {
  currentLang = lang
  document.getElementById('btn-zh').classList.toggle('active', lang === 'zh')
  document.getElementById('btn-en').classList.toggle('active', lang === 'en')

  const t = i18n[lang]

  // landing
  const eyebrow = document.querySelector('.landing-eyebrow')
  if (eyebrow) eyebrow.textContent = t.landingEyebrow

  const titleMain = document.getElementById('landing-title-main')
  if (titleMain) titleMain.textContent = t.landingTitle
  const highlight = document.getElementById('landing-title-highlight')
  if (highlight) highlight.textContent = t.landingHighlight

  const subtitle = document.querySelector('.landing-subtitle')
  if (subtitle) subtitle.innerHTML = t.landingSubtitle

  const startBtn = document.querySelector('.btn-start')
  if (startBtn) startBtn.textContent = t.landingStart

  const meta = document.querySelector('.landing-meta')
  if (meta) meta.textContent = t.landingMeta

  // if quiz is active, re-render current question
  if (document.getElementById('screen-quiz').classList.contains('active')) {
    renderQuestion()
  }

  // nav buttons
  const prevBtn = document.getElementById('btn-prev')
  if (prevBtn) prevBtn.textContent = t.prevBtn

  const nextBtn = document.getElementById('btn-next')
  if (nextBtn) {
    const isLast = currentQ === 29
    nextBtn.textContent = isLast ? t.finishBtn : t.nextBtn
  }

  // result page labels
  const eyebrowR = document.querySelector('.result-eyebrow')
  if (eyebrowR) eyebrowR.textContent = t.resultEyebrow

  const pctLabel = document.querySelector('.result-pct-label')
  if (pctLabel) pctLabel.textContent = t.resultPctLabel

  document.querySelectorAll('.result-section-title').forEach((el, i) => {
    const keys = ['resultSectionDesc','resultSectionDestiny','resultSectionPartner','resultSectionSimilar']
    if (keys[i]) el.textContent = t[keys[i]]
  })

  const partnerSub = document.querySelector('.partner-label')
  if (partnerSub) partnerSub.textContent = t.partnerSub

  const shareBtn = document.querySelector('.btn-share')
  if (shareBtn) shareBtn.textContent = t.shareBtn

  const retryBtn = document.querySelector('.btn-retry')
  if (retryBtn) retryBtn.textContent = t.retryBtn

  // 广告页文字
  if (document.getElementById('ad-sub-text')) {
    document.getElementById('ad-sub-text').textContent = t.adSub
    document.getElementById('ad-countdown-label').textContent = t.adCountdown
    document.getElementById('ad-countdown-suffix').textContent = t.adCountdown2
  }

  // 如果结果页是active，重新渲染结果
  if (document.getElementById('screen-result').classList.contains('active')) {
    showResult()
  }
}

function getQuestions() {
  return currentLang === 'en' ? questionsEn : questions
}

function getStarData(zhName) {
  const base = stars[zhName]
  if (currentLang === 'en') {
    const en = starsEn[zhName]
    if (en) return { ...base, name: en.name, country: en.country, type: en.type, desc1: en.desc1, quote: en.quote, destinyDesc: en.destinyDesc }
  }
  return base
}

function getDestinyData(destinyKey) {
  if (currentLang === 'en') return destinyEn[destinyKey]
  return destinyLevels[destinyKey]
}
